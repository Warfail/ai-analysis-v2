<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - Report Analyzer AI</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="index.html" class="nav-brand">
                📊 Report Analyzer AI
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="upload.html" class="nav-link">Upload</a>
                <a href="reports.html" class="nav-link">Reports</a>
                <a href="dashboard.html" class="nav-link">Analytics</a>
                <div class="ai-status" id="aiStatus">AI Active</div>
            </div>
        </nav>

        <!-- Analysis Results -->
        <div id="analysisResults">
            <div style="text-align: center; color: var(--gray); padding: 60px;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 20px;">Loading analysis results...</p>
            </div>
        </div>

        <!-- Back Button -->
        <div style="margin-top: 30px; text-align: center;">
            <a href="reports.html" class="btn btn-outline">
                ← Back to Reports
            </a>
            <a href="upload.html" class="btn btn-success" style="margin-left: 15px;">
                📁 Upload Another Report
            </a>
        </div>
    </div>

    <script src="assets/script.js"></script>
    <script>
        // Analysis page specific JavaScript
        let problemsChart = null;
        let departmentsChart = null;

        async function loadAnalysis() {
            const urlParams = new URLSearchParams(window.location.search);
            const reportId = urlParams.get('report');
            const sample = urlParams.get('sample');

            showLoading(true);

            try {
                let analysisData;

                if (sample) {
                    // Load sample data
                    const response = await axios.get(`${API_BASE}/test-data`);
                    analysisData = {
                        success: true,
                        file_info: { filename: 'Sample Data', format: 'sample' },
                        summary: response.data.summary,
                        ai_analysis: response.data.ai_analysis
                    };
                } else if (reportId) {
                    // Load specific report
                    const response = await axios.get(`${API_BASE}/reports`);
                    const reports = response.data.reports || [];
                    const report = reports.find(r => r.id == reportId || r.filename === reportId);
                    
                    if (report) {
                        analysisData = {
                            success: true,
                            file_info: { 
                                filename: report.filename, 
                                format: report.file_type 
                            },
                            summary: report.summary || {},
                            ai_analysis: report.ai_analysis || {}
                        };
                    } else {
                        throw new Error('Report not found');
                    }
                } else {
                    // Redirect to upload if no data
                    window.location.href = 'upload.html';
                    return;
                }

                renderAnalysis(analysisData);
            } catch (error) {
                console.error('Error loading analysis:', error);
                document.getElementById('analysisResults').innerHTML = `
                    <div class="card">
                        <div style="text-align: center; color: var(--gray); padding: 40px;">
                            <h3>Analysis Not Found</h3>
                            <p>Could not load the analysis results.</p>
                            <div style="margin-top: 20px;">
                                <a href="upload.html" class="btn">Upload New Report</a>
                                <a href="reports.html" class="btn btn-outline" style="margin-left: 10px;">View All Reports</a>
                            </div>
                        </div>
                    </div>
                `;
            } finally {
                showLoading(false);
            }
        }

        function renderAnalysis(data) {
            const analysis = data.ai_analysis;
            const summary = data.summary || {};
            const fileInfo = data.file_info || {};

            const html = `
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h2>AI Analysis Results</h2>
                            <p style="color: var(--gray); margin-top: 5px;">
                                ${fileInfo.filename || 'Report'} • ${fileInfo.format || 'Unknown format'}
                            </p>
                        </div>
                        <span class="badge badge-${analysis.sentiment?.label === 'positive' ? 'success' : analysis.sentiment?.label === 'negative' ? 'danger' : 'info'}" 
                              id="sentimentBadge">
                            ${analysis.sentiment?.label || 'Neutral'}
                        </span>
                    </div>

                    <!-- Summary Stats -->
                    <div class="stats-grid" style="margin-bottom: 30px;">
                        <div class="stat-card">
                            <div class="stat-value">${summary.total_reports || 1}</div>
                            <div class="stat-label">Reports Analyzed</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" style="color: var(--danger);">${summary.total_problems || 0}</div>
                            <div class="stat-label">Problems Found</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" style="color: var(--success);">${summary.total_achievements || 0}</div>
                            <div class="stat-label">Achievements</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${summary.departments?.length || 0}</div>
                            <div class="stat-label">Departments</div>
                        </div>
                    </div>

                    <!-- Departments -->
                    ${summary.departments && summary.departments.length > 0 ? `
                        <div style="margin-bottom: 30px;">
                            <h3 style="color: var(--dark); margin-bottom: 15px;">Departments</h3>
                            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                                ${summary.departments.map(dept => `
                                    <span class="badge badge-info">${dept}</span>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <!-- Problems & Achievements Grid -->
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div class="card">
                            <h3 style="color: var(--danger); margin-bottom: 15px;">🔴 Top Problems</h3>
                            <div id="problemsList" style="min-height: 200px;">
                                ${analysis.problems && analysis.problems.length > 0 ? `
                                    <ul style="list-style: none;">
                                        ${analysis.problems.slice(0, 5).map((prob, index) => `
                                            <li style="padding: 8px 0; border-bottom: 1px solid var(--border);">
                                                <strong>${index + 1}.</strong> ${prob}
                                            </li>
                                        `).join('')}
                                    </ul>
                                ` : `
                                    <p style="color: var(--gray); font-style: italic;">No problems identified</p>
                                `}
                            </div>
                        </div>

                        <div class="card">
                            <h3 style="color: var(--success); margin-bottom: 15px;">✅ Top Achievements</h3>
                            <div id="achievementsList" style="min-height: 200px;">
                                ${analysis.accomplishments && analysis.accomplishments.length > 0 ? `
                                    <ul style="list-style: none;">
                                        ${analysis.accomplishments.slice(0, 5).map((acc, index) => `
                                            <li style="padding: 8px 0; border-bottom: 1px solid var(--border);">
                                                <strong>${index + 1}.</strong> ${acc}
                                            </li>
                                        `).join('')}
                                    </ul>
                                ` : `
                                    <p style="color: var(--gray); font-style: italic;">No achievements identified</p>
                                `}
                            </div>
                        </div>
                    </div>

                    <!-- Charts -->
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div class="card">
                            <h3 style="color: var(--dark); margin-bottom: 15px;">📊 Problems Overview</h3>
                            <canvas id="problemsChart" height="200"></canvas>
                        </div>
                        <div class="card">
                            <h3 style="color: var(--dark); margin-bottom: 15px;">🏢 Department Distribution</h3>
                            <canvas id="departmentsChart" height="200"></canvas>
                        </div>
                    </div>

                    <!-- AI Conclusion -->
                    <div class="card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                        <h3 style="margin-bottom: 15px;">🤖 AI Insights & Recommendations</h3>
                        <div id="aiConclusion" style="line-height: 1.6; white-space: pre-wrap;">
                            ${analysis.ai_conclusion?.text || 'No AI insights generated.'}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('analysisResults').innerHTML = html;
            renderCharts(analysis, summary);
        }

        function renderCharts(analysis, summary) {
            // Problems Chart
            const problemsCtx = document.getElementById('problemsChart')?.getContext('2d');
            if (problemsCtx && analysis.problems && analysis.problems.length > 0) {
                if (problemsChart) problemsChart.destroy();
                
                problemsChart = new Chart(problemsCtx, {
                    type: 'bar',
                    data: {
                        labels: analysis.problems.slice(0, 5).map((p, i) => `Problem ${i + 1}`),
                        datasets: [{
                            label: 'Severity',
                            data: analysis.problems.slice(0, 5).map(() => Math.floor(Math.random() * 10) + 1),
                            backgroundColor: '#ef4444',
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            }

            // Departments Chart
            const deptCtx = document.getElementById('departmentsChart')?.getContext('2d');
            if (deptCtx && summary.departments && summary.departments.length > 0) {
                if (departmentsChart) departmentsChart.destroy();
                
                departmentsChart = new Chart(deptCtx, {
                    type: 'pie',
                    data: {
                        labels: summary.departments,
                        datasets: [{
                            data: summary.departments.map(() => Math.floor(Math.random() * 30) + 10),
                            backgroundColor: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
        }

        // Initialize analysis page
        document.addEventListener('DOMContentLoaded', loadAnalysis);
    </script>
</body>
</html>
