<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Report Analyzer AI</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="index.html" class="nav-brand">
                📊 Report Analyzer AI
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="upload.html" class="nav-link">Upload</a>
                <a href="reports.html" class="nav-link active">Reports</a>
                <a href="dashboard.html" class="nav-link">Analytics</a>
                <div class="ai-status" id="aiStatus">AI Active</div>
            </div>
        </nav>

        <!-- Reports Header -->
        <div class="card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>All Reports</h2>
                    <p style="color: var(--gray); margin-top: 5px;">
                        View and manage all analyzed reports
                    </p>
                </div>
                <a href="upload.html" class="btn btn-success">
                    + New Report
                </a>
            </div>

            <!-- Filters -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                <div class="form-group">
                    <label for="filterDepartment">Department</label>
                    <select id="filterDepartment" class="form-control" onchange="filterReports()">
                        <option value="">All Departments</option>
                        <option value="IT">IT</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="HR">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filterSentiment">Sentiment</label>
                    <select id="filterSentiment" class="form-control" onchange="filterReports()">
                        <option value="">All Sentiments</option>
                        <option value="positive">Positive</option>
                        <option value="negative">Negative</option>
                        <option value="neutral">Neutral</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filterDate">Date Range</label>
                    <input type="date" id="filterDate" class="form-control" onchange="filterReports()">
                </div>
                <div class="form-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" class="form-control" placeholder="Search reports..." oninput="filterReports()">
                </div>
            </div>

            <!-- Reports Table -->
            <div id="reportsTable">
                <div style="text-align: center; color: var(--gray); padding: 60px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 20px;">Loading reports...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                <div style="color: var(--gray);">
                    Showing <span id="showingCount">0</span> of <span id="totalCount">0</span> reports
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-outline" onclick="changePage(-1)" id="prevBtn" disabled>
                        ← Previous
                    </button>
                    <span style="padding: 10px 15px; color: var(--gray);">
                        Page <span id="currentPage">1</span>
                    </span>
                    <button class="btn btn-outline" onclick="changePage(1)" id="nextBtn">
                        Next →
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div class="loading" id="loadingIndicator">
            <div class="loading-spinner"></div>
            <p>Loading reports...</p>
        </div>
    </div>

    <script src="assets/script.js"></script>
    <script>
        // Reports page specific JavaScript
        let allReports = [];
        let filteredReports = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadReports() {
            showLoading(true);
            try {
                const response = await axios.get(`${API_BASE}/reports`);
                allReports = response.data.reports || [];
                filteredReports = [...allReports];
                renderReports();
                updatePagination();
            } catch (error) {
                console.error('Error loading reports:', error);
                showAlert('Failed to load reports', 'error');
                document.getElementById('reportsTable').innerHTML = `
                    <div style="text-align: center; color: var(--gray); padding: 40px;">
                        <p>Failed to load reports. Please try again.</p>
                        <button class="btn" onclick="loadReports()" style="margin-top: 15px;">Retry</button>
                    </div>
                `;
            } finally {
                showLoading(false);
            }
        }

        function filterReports() {
            const department = document.getElementById('filterDepartment').value;
            const sentiment = document.getElementById('filterSentiment').value;
            const date = document.getElementById('filterDate').value;
            const search = document.getElementById('search').value.toLowerCase();

            filteredReports = allReports.filter(report => {
                // Filter by department
                if (department && report.department !== department) return false;
                
                // Filter by sentiment
                if (sentiment && report.sentiment_label !== sentiment) return false;
                
                // Filter by date
                if (date) {
                    const reportDate = new Date(report.report_date || report.upload_date).toISOString().split('T')[0];
                    if (reportDate !== date) return false;
                }
                
                // Search in various fields
                if (search) {
                    const searchFields = [
                        report.department,
                        report.filename,
                        report.file_type,
                        report.content_preview,
                        report.sentiment_label
                    ].filter(Boolean).join(' ').toLowerCase();
                    
                    if (!searchFields.includes(search)) return false;
                }
                
                return true;
            });

            currentPage = 1;
            renderReports();
            updatePagination();
        }

        function renderReports() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageReports = filteredReports.slice(startIndex, endIndex);

            const tableHTML = `
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Department</th>
                                <th>Date</th>
                                <th>Filename</th>
                                <th>Type</th>
                                <th>Problems</th>
                                <th>Achievements</th>
                                <th>Sentiment</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${pageReports.length > 0 ? pageReports.map(report => `
                                <tr>
                                    <td>${report.department || 'N/A'}</td>
                                    <td>${formatDate(report.report_date || report.upload_date)}</td>
                                    <td>${report.filename}</td>
                                    <td><span class="badge badge-info">${report.file_type}</span></td>
                                    <td><span class="badge badge-danger">${report.total_problems || 0}</span></td>
                                    <td><span class="badge badge-success">${report.total_achievements || 0}</span></td>
                                    <td>
                                        <span class="badge badge-${report.sentiment_label === 'positive' ? 'success' : report.sentiment_label === 'negative' ? 'danger' : 'info'}">
                                            ${report.sentiment_label || 'neutral'}
                                        </span>
                                    </td>
                                    <td>
                                        <button class="btn" onclick="viewReport(${report.id})" style="padding: 5px 10px; font-size: 14px;">
                                            View
                                        </button>
                                    </td>
                                </tr>
                            `).join('') : `
                                <tr>
                                    <td colspan="8" style="text-align: center; color: var(--gray); padding: 40px;">
                                        No reports found matching your filters.
                                    </td>
                                </tr>
                            `}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('reportsTable').innerHTML = tableHTML;
            document.getElementById('showingCount').textContent = `${startIndex + 1}-${Math.min(endIndex, filteredReports.length)}`;
            document.getElementById('totalCount').textContent = filteredReports.length;
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredReports.length / itemsPerPage);
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filteredReports.length / itemsPerPage);
            const newPage = currentPage + direction;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderReports();
                updatePagination();
            }
        }

        function viewReport(reportId) {
            window.location.href = `analysis.html?report=${reportId}`;
        }

        // Initialize reports page
        document.addEventListener('DOMContentLoaded', loadReports);
    </script>
</body>
</html>
