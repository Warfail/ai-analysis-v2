services:
  - type: web
    name: report-analyzer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Will set manually
      - key: PYTHON_VERSION
        value: 3.11.0